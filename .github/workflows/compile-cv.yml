name: Compile LaTeX CV
on: [push]

# Permessi necessari per permettere all'action di fare il commit del PDF
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          # RELATIVO alla working_directory: se sei già dentro asset/cv, cerchi solo main.tex
          root_file: main.tex
          compiler: xelatex 
          working_directory: asset/cv/

      - name: Rename and Prepare PDF
        run: |
          # Il PDF viene generato dove si trova il root_file
          # Lo rinominiamo per coerenza con il tuo sito
          mv asset/cv/main.pdf asset/cv/cv_mattia_fait.pdf

      - name: Upload PDF to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: formal cv auto-update [skip ci]"
          file_pattern: 'asset/cv/cv_mattia_fait.pdf'
          # [skip ci] evita che il commit automatico faccia ripartire l'action in loop
